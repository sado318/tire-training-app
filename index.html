<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>タイヤショップ新人教育アプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f7f9;
  --surface:#ffffff;
  --surface-2:#f1f3f5;
  --surface-3:#e8eaed;
  --border:#e3e6ea;
  --border-strong:#d4d8dd;
  --primary:#2f6fed;
  --primary-ink:#ffffff;
  --primary-soft:#eaf1fe;
  --ai:#7c4dea;
  --ai-soft:#f2eefd;
  --warn:#dc2626;
  --warn-soft:#fdecec;
  --good:#16a34a;
  --good-soft:#eaf7ee;
  --text:#1a1d21;
  --text-dim:#5b6168;
  --text-faint:#8f959c;
  --shadow: 0 1px 2px rgba(20,22,25,.04), 0 1px 8px rgba(20,22,25,.04);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'IBM Plex Mono',monospace;}

#app{max-width:1120px;margin:0 auto;padding:0 0 90px;}

/* header */
header.top{
  padding:26px 28px 0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
header.top .headwrap{
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  padding-bottom:20px;
}
.brand{display:flex;align-items:center;gap:12px;}
.brand .logo{
  width:38px;height:38px;border-radius:10px;
  background:var(--primary);color:#fff;
  display:flex;align-items:center;justify-content:center;flex:none;
}
.brand .logo svg{width:20px;height:20px;}
header.top h1{font-size:19px;margin:0;line-height:1.3;font-weight:700;color:var(--text);}
header.top p.sub{margin:2px 0 0;color:var(--text-faint);font-size:13px;}
.staffbox{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:7px 12px;}
.staffbox label{font-size:12px;color:var(--text-faint);white-space:nowrap;}
.staffbox input{background:transparent;border:none;color:var(--text);font-family:'Inter',sans-serif;font-size:13.5px;width:110px;outline:none;}

nav.tabs{display:flex;gap:4px;margin-top:2px;}
nav.tabs button{
  appearance:none;border:none;background:none;cursor:pointer;
  color:var(--text-faint);font-family:'Inter',sans-serif;font-weight:600;font-size:14px;
  display:flex;align-items:center;gap:7px;
  padding:11px 14px;
  border-bottom:2px solid transparent;
  transition:color .15s ease;
}
nav.tabs button svg{width:16px;height:16px;flex:none;}
nav.tabs button:hover{color:var(--text);}
nav.tabs button.active{color:var(--primary);border-bottom-color:var(--primary);}

main{padding:28px;}
.hidden{display:none !important;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;box-shadow:var(--shadow);}
.grid{display:grid;gap:12px;}
.q-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}

.q-card{
  background:var(--surface);border:1px solid var(--border);border-radius:11px;
  padding:16px 16px 14px;cursor:pointer;
  transition:border-color .15s ease, box-shadow .15s ease;
  position:relative;
}
.q-card:hover{border-color:var(--primary);box-shadow:var(--shadow);}
.q-card.ai-card:hover{border-color:var(--ai);}
.q-card.ai-card{border-top:3px solid var(--ai);}
.q-card:not(.ai-card){border-top:3px solid var(--primary-soft);}
.q-card .qnum{font-size:12px;color:var(--text-faint);display:flex;align-items:center;gap:8px;}
.q-card h3{font-size:14.5px;line-height:1.5;margin:8px 0 12px;font-weight:600;color:var(--text);}
.status-pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;padding:4px 10px;border-radius:20px;font-weight:600;}
.status-pill.unanswered{background:var(--surface-2);color:var(--text-faint);}
.status-pill.correct{background:var(--good-soft);color:var(--good);}
.status-pill.incorrect{background:var(--warn-soft);color:var(--warn);}
.ai-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--ai);background:var(--ai-soft);padding:3px 9px;border-radius:20px;}

.progress-row{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
.progress-track{flex:1;height:8px;background:var(--surface-3);border-radius:20px;overflow:hidden;}
.progress-fill{height:100%;background:var(--primary);border-radius:20px;transition:width .3s ease;}
.progress-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);white-space:nowrap;}

.section-title{font-size:13px;font-weight:700;color:var(--text-dim);margin:0 0 12px;display:flex;align-items:center;gap:8px;}
.section-head-row{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin:34px 0 12px;}

.back-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:16px;padding:0;}
.back-btn:hover{color:var(--primary);}
.detail-q{font-size:18px;line-height:1.6;margin:0 0 20px;font-weight:700;}
.choice-list{display:flex;flex-direction:column;gap:9px;}
.choice{display:flex;align-items:center;gap:12px;border:1px solid var(--border);background:var(--surface);border-radius:10px;padding:13px 16px;cursor:pointer;font-size:14.5px;transition:border-color .15s ease,background .15s ease;}
.choice:hover:not(.locked){border-color:var(--primary);background:var(--primary-soft);}
.choice .letter{flex:none;width:24px;height:24px;border-radius:50%;background:var(--surface-2);color:var(--text-dim);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.choice.chosen-correct{border-color:var(--good);background:var(--good-soft);}
.choice.chosen-correct .letter{background:var(--good);color:#fff;}
.choice.chosen-wrong{border-color:var(--warn);background:var(--warn-soft);}
.choice.chosen-wrong .letter{background:var(--warn);color:#fff;}
.choice.reveal-correct{border-color:var(--good);}
.choice.reveal-correct .letter{background:var(--good);color:#fff;}

.explain-box{margin-top:20px;padding:16px 18px;border-radius:10px;background:var(--primary-soft);border-left:3px solid var(--primary);}
.explain-box.ai{background:var(--ai-soft);border-left-color:var(--ai);}
.explain-box .tag{font-size:11.5px;font-weight:700;color:var(--primary);margin-bottom:8px;display:block;}
.explain-box.ai .tag{color:var(--ai);}
.explain-box p{margin:0;font-size:14px;line-height:1.7;color:var(--text-dim);}
.next-row{display:flex;justify-content:flex-end;margin-top:20px;}

.btn{font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;background:var(--primary);color:var(--primary-ink);border:none;border-radius:8px;padding:10px 18px;cursor:pointer;transition:filter .15s ease, box-shadow .15s ease;}
.btn:hover{filter:brightness(1.06);}
.btn.ghost{background:transparent;border:1px solid var(--border-strong);color:var(--text);}
.btn.ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn.ai-btn{background:var(--ai);}
.btn:disabled{opacity:.5;cursor:not-allowed;filter:none;}
.btn.danger{background:var(--warn);color:#fff;}
.btn.small{padding:7px 13px;font-size:12.5px;}

.spinner{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;display:inline-block;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:7px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* practice tab */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;color:var(--text-faint);margin-bottom:6px;font-weight:600;}
.field input,.field textarea{width:100%;background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;color:var(--text);padding:10px 13px;font-family:'Inter',sans-serif;font-size:14px;resize:vertical;}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);}
.field textarea{line-height:1.7;}
.char-count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-faint);text-align:right;margin-top:4px;}

.feedback-card{margin-top:18px;padding:18px 20px;border-radius:10px;background:var(--ai-soft);border:1px solid #ded3fb;}
.feedback-card .tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--ai);margin-bottom:10px;}
.feedback-card .body-text{white-space:pre-wrap;font-size:14px;line-height:1.85;color:var(--text);}

.entry-list{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
details.entry{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px 16px;box-shadow:var(--shadow);}
details.entry[open]{border-color:var(--ai);}
details.entry summary{cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
details.entry summary::-webkit-details-marker{display:none;}
details.entry summary h4{margin:0 0 4px;font-size:14.5px;font-weight:600;}
details.entry .meta{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--text-faint);}
.entry-body{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.entry-body .label{font-size:11px;font-weight:700;color:var(--text-faint);margin-bottom:6px;}
.entry-body .orig-text{white-space:pre-wrap;font-size:13.5px;line-height:1.7;color:var(--text-dim);background:var(--surface-2);border-radius:8px;padding:12px 14px;margin-bottom:14px;}

/* board */
.board-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
.post-list{display:flex;flex-direction:column;gap:10px;}
.post-item{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:15px 16px;cursor:pointer;transition:border-color .15s ease, box-shadow .15s ease;box-shadow:var(--shadow);}
.post-item:hover{border-color:var(--primary);}
.post-item h4{margin:0 0 6px;font-size:14.5px;font-weight:700;}
.post-item p{margin:0;font-size:13px;color:var(--text-dim);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.post-item .meta{margin-top:10px;display:flex;gap:14px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--text-faint);}

.modal-bg{position:fixed;inset:0;background:rgba(20,22,25,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:460px;max-height:86vh;overflow-y:auto;box-shadow:0 10px 40px rgba(20,22,25,.18);}
.modal h3{margin:0 0 14px;font-size:16.5px;font-weight:700;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:6px;}

.comment-list{display:flex;flex-direction:column;gap:10px;margin-top:16px;}
.comment{background:var(--surface-2);border-radius:10px;padding:12px 14px;}
.comment .c-meta{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-faint);margin-bottom:6px;}
.comment p{margin:0;font-size:13.5px;line-height:1.6;color:var(--text);}

.empty{padding:44px 20px;text-align:center;color:var(--text-faint);}
.empty svg{width:32px;height:32px;margin-bottom:10px;opacity:.5;}

.divider{height:1px;background:var(--border);margin:20px 0;border:none;}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;font-weight:500;z-index:80;opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;box-shadow:0 8px 24px rgba(0,0,0,.18);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

@media (max-width:640px){
  header.top{padding:18px 16px 0;}
  main{padding:16px;}
  nav.tabs{overflow-x:auto;}
  .staffbox input{width:80px;}
}
</style>
</head>
<body>
<div id="app">

  <header class="top">
    <div class="headwrap">
      <div class="brand">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div>
          <h1>タイヤショップ 新人教育</h1>
          <p class="sub">AIコーチと学ぶ研修アプリ</p>
        </div>
      </div>
      <div class="staffbox">
        <label>担当者名</label>
        <input id="staffName" type="text" placeholder="例）山田" maxlength="12">
      </div>
      <!-- キー入力欄を追加 -->
      <div class="staffbox">
        <label>APIキー</label>
        <input id="apiConfigKey" type="password" placeholder="Geminiキーを入力" maxlength="100">
      </div>
    </div>
    <nav class="tabs" id="tabs">
      <button data-tab="quiz" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        クイズ
      </button>
      <button data-tab="practice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 10h8M8 13h5"/></svg>
        ロープレ練習
      </button>
      <button data-tab="board">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 5 0c0 1.5-2 1.7-2 3.5M12 17h.01"/></svg>
        質問掲示板
      </button>
    </nav>
  </header>

  <main>
    <!-- QUIZ TAB -->
    <section id="tab-quiz">
      <div id="quizList"></div>
      <div id="quizDetail" class="hidden"></div>
    </section>

    <!-- PRACTICE (AI ロープレ) TAB -->
    <section id="tab-practice" class="hidden">
      <div id="practiceForm"></div>
      <div id="practiceDetail" class="hidden"></div>
    </section>

    <!-- BOARD TAB -->
    <section id="tab-board" class="hidden">
      <div class="board-toolbar">
        <p class="section-title" style="margin:0;">よくある質問・状況相談（全スタッフ共有）</p>
        <button class="btn" id="newPostBtn">＋ 質問を投稿</button>
      </div>
      <div id="postList" class="post-list"></div>
      <div id="postDetail" class="hidden"></div>
    </section>
  </main>
</div>

<div id="toast" class="toast"></div>

<script>
/* ===================== 共通ユーティリティ ===================== */
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

function showToast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 2400);
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function getStaffName(){
  const v = $('#staffName').value.trim();
  return v || '匿名スタッフ';
}
$('#staffName').addEventListener('input', ()=>{
  window.storage.set('my-name', $('#staffName').value.trim(), false).catch(()=>{});
});
(async function loadName(){
  try{
    const r = await window.storage.get('my-name', false);
    if(r && r.value) $('#staffName').value = r.value;
  }catch(e){}
})();
function fmtDate(ts){
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function emptyState(title, sub){
  return `
    <div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>
      <div style="font-size:14px;color:var(--text-dim);margin-bottom:4px;">${title}</div>
      <div style="font-size:12.5px;">${sub}</div>
    </div>
  `;
}
// 昔のコードがエラーにならないようにする救済措置
window.storage = {
  get: (key) => Promise.resolve({ value: localStorage.getItem(key) }),
  set: (key, val) => { localStorage.setItem(key, val); return Promise.resolve(); },
  list: (prefix) => {
    const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix));
    return Promise.resolve({ keys });
  }
};


/* ===================== 設定とAI呼び出し（修正版） ===================== */
// localStorageを使ってブラウザ内にAPIキーを保存
const getApiKey = () => $('#apiConfigKey').value.trim();

// 入力時に自動保存
$('#apiConfigKey').addEventListener('input', () => {
  localStorage.setItem('user-api-key', $('#apiConfigKey').value.trim());
});

// 読み込み時に復元
(async function loadApiKey(){
  const savedKey = localStorage.getItem('user-api-key');
  if(savedKey) $('#apiConfigKey').value = savedKey;
})();

async function callAI(systemPrompt, userPrompt, maxTokens=1000) {
  const apiKey = getApiKey();
  if (!apiKey) {
    showToast('APIキーを入力してください');
    throw new Error('APIキー未入力');
  }

  const url =`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`;
  const response = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      systemInstruction: {
        parts: [{ text: systemPrompt }]
      },
      contents: [{
        parts: [{
          text: userPrompt
        }]
      }],
      generationConfig: {
        maxOutputTokens: maxTokens
      }
    })
  });
  
  const data = await response.json();
  if (data.error) {
    showToast('エラー: ' + data.error.message);
    throw new Error(data.error.message);
  }
  return data.candidates[0].content.parts[0].text.trim();
}

/* ===================== タブ切り替え ===================== */
$('#tabs').addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-tab]');
  if(!btn) return;
  $$('#tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['quiz','practice','board'].forEach(name=>{
    $('#tab-'+name).classList.toggle('hidden', name !== btn.dataset.tab);
  });
});

/* ===================== 1. クイズ機能（基礎 + AI生成） ===================== */
const QUIZ_DATA = [
  { id:'q1', q:'タイヤのサイズ表記「195/65R15 91H」の「65」が示すものはどれですか？',
    choices:['タイヤの外径（インチ）','扁平率（タイヤ幅に対する高さの割合・％）','ホイールの直径（インチ）','速度記号'],
    correct:1, explain:'「65」は扁平率（アスペクト比）で、タイヤ幅に対する断面高さの割合を％で表したものです。数値が小さいほど扁平で、乗り心地よりハンドリング重視の傾向になります。' },
  { id:'q2', q:'タイヤの残り溝を確認する「スリップサイン」が露出している状態は、道路交通法上どのように扱われますか？',
    choices:['溝が浅いだけなので特に問題ない','残り溝1.6mm未満とみなされ整備不良（違法）になる','夏タイヤ限定の注意表示','スタッドレスタイヤのみ対象'],
    correct:1, explain:'スリップサインが1箇所でも露出すると整備不良（保安基準違反）となり公道走行できません。全溝を目視確認し、露出があれば交換をご案内してください。' },
  { id:'q3', q:'タイヤの空気圧点検について、正しい説明はどれですか？',
    choices:['エンジンで温まったタイヤの方が正確な値が出る','走行直後の温まった状態で測るのが基本','冷えている状態（走行前）で測るのが基本','空気圧はメーカーに関わらず一律でよい'],
    correct:2, explain:'空気圧は走行熱で上昇するため、正確な数値を測るには走行前の冷えた状態（コールドインフレーション）で測定するのが基本です。指定空気圧は運転席ドア付近のラベルに記載されています。' },
  { id:'q4', q:'スタッドレスタイヤの主な特長として最も適切なものはどれですか？',
    choices:['ゴムが硬化しにくく低温でも柔軟性を保ち、氷雪路でのグリップ力を高めている','夏場の高速走行時の耐久性に特化している','サマータイヤより静粛性が常に高い','どの季節でも性能差がない'],
    correct:0, explain:'スタッドレスタイヤは特殊コンパウンドにより低温下でもゴムが硬くなりにくく柔軟性を保つことで、氷雪路面へのグリップ力を確保します。夏場の使用は摩耗が早いので季節に応じた履き替えが必要です。' },

let quizProgress = {};
let aiQuizData = [];
let currentQuizId = null;
let generatingQuiz = false;

function allQuizData(){ return QUIZ_DATA.concat(aiQuizData); }

async function loadQuizProgress(){
  try{
    const r = await window.storage.get('quiz-progress', false);
    quizProgress = r && r.value ? JSON.parse(r.value) : {};
  }catch(e){ quizProgress = {}; }
}
async function saveQuizProgress(){
  try{ await window.storage.set('quiz-progress', JSON.stringify(quizProgress), false); }catch(e){}
}
async function loadAiQuizBank(){
  try{
    const r = await window.storage.get('ai-quiz-bank', false);
    aiQuizData = r && r.value ? JSON.parse(r.value) : [];
  }catch(e){ aiQuizData = []; }
}
async function saveAiQuizBank(){
  try{ await window.storage.set('ai-quiz-bank', JSON.stringify(aiQuizData), false); }catch(e){}
}

function renderQuizList(){
  const answeredCount = QUIZ_DATA.filter(q=>quizProgress[q.id]?.answered).length;
  const pct = Math.round((answeredCount/QUIZ_DATA.length)*100);

  let html = `
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${answeredCount} / ${QUIZ_DATA.length} 問回答済み</div>
    </div>
    <p class="section-title">基礎問題</p>
    <div class="grid q-grid">
  `;
  QUIZ_DATA.forEach((q,i)=>{
    html += quizCardHtml(q, i+1);
  });
  html += `</div>`;

  html += `
    <div class="section-head-row">
      <p class="section-title" style="margin:0;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--ai)"><path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4z"/></svg>
        AIが作る苦手克服問題
      </p>
      <button class="btn ai-btn small" id="genQuizBtn" ${generatingQuiz?'disabled':''}>
        ${generatingQuiz ? '<span class="spinner"></span>AIが作成中…' : (aiQuizData.length ? '新しく作り直す' : '問題を作成する')}
      </button>
    </div>
  `;
  if(aiQuizData.length){
    html += `<div class="grid q-grid">`;
    aiQuizData.forEach((q)=>{
      html += quizCardHtml(q, null, true);
    });
    html += `</div>`;
  } else if(!generatingQuiz){
    html += emptyState('まだAI問題がありません', '間違えた問題の分野をもとに、AIが練習問題を作成します。');
  }

  $('#quizList').innerHTML = html;

  $$('.q-card', $('#quizList')).forEach(card=>{
    card.addEventListener('click', ()=>openQuizDetail(card.dataset.id));
  });
  const genBtn = $('#genQuizBtn');
  if(genBtn) genBtn.addEventListener('click', generateAiQuiz);
}

function quizCardHtml(q, num, isAi){
  const prog = quizProgress[q.id];
  let pill = '<span class="status-pill unanswered">未回答</span>';
  if(prog?.answered){
    pill = prog.correctFlag
      ? '<span class="status-pill correct">正解 ✓</span>'
      : '<span class="status-pill incorrect">要復習 ✗</span>';
  }
  return `
    <div class="q-card ${isAi?'ai-card':''}" data-id="${q.id}">
      <div class="qnum mono">${isAi ? '<span class="ai-badge">✦ AI生成</span>' : 'Q'+num.toString().padStart(2,'0')}</div>
      <h3>${escapeHtml(q.q)}</h3>
      ${pill}
    </div>
  `;
}

async function generateAiQuiz(){
  if(generatingQuiz) return;
  generatingQuiz = true;
  renderQuizList();

  const weakQs = QUIZ_DATA.filter(q => quizProgress[q.id]?.answered && !quizProgress[q.id]?.correctFlag);
  const topicText = weakQs.length
    ? weakQs.map(q=>'・'+q.q).join('\n')
    : '（まだ間違えた問題はありません。タイヤ構造・整備・安全に関する基礎知識から幅広く出題してください）';

  const systemPrompt = 'あなたはタイヤ販売店の新人研修教材を作成するベテラン講師です。出力は必ずJSON配列のみを返し、前後に説明文やコードブロック記号(```)は一切つけないでください。各要素は次のキーを持つオブジェクトです: q(問題文,string), choices(4つの選択肢からなる配列,string×4), correct(正解のインデックス,0〜3の整数), explain(解説文,100〜160字程度のstring)。';
  const userPrompt = `次の分野を苦手としている新人スタッフ向けに、実務に役立つタイヤ販売店の接客・整備知識に関する4択問題を3問作成してください。\n\n苦手分野の元になった問題:\n${topicText}\n\n既存の定番問題と表現が重複しないようにしてください。`;

try{
    // callClaude を callAI に変更
    const raw = await callAI(systemPrompt, userPrompt, 1400); 

      console.log(raw);
    
    // JSONの掃除をここで行う（stripJsonFence関数は不要になります）
    const cleanedRaw = raw.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
    const parsed = JSON.parse(cleanedRaw);
    
    if(!Array.isArray(parsed) || parsed.length===0) throw new Error('invalid format');
    const newItems = parsed.map(item => ({
      id: 'ai_'+uid(),
      q: item.q,
      choices: item.choices,
      correct: item.correct,
      explain: item.explain,
      generatedAt: Date.now()
    }));
    aiQuizData = newItems.concat(aiQuizData).slice(0, 12);
    await saveAiQuizBank();
    showToast('AIが新しい問題を作成しました');
  }catch(e){
    console.error(e); // エラー内容がコンソールで見れるので便利です
    showToast('AI問題の作成に失敗しました。もう一度お試しください。');
  }finally{
    generatingQuiz = false;
    renderQuizList();
  }
}

function openQuizDetail(id){
  currentQuizId = id;
  $('#quizList').classList.add('hidden');
  $('#quizDetail').classList.remove('hidden');
  renderQuizDetail();
}

function renderQuizDetail(){
  const combined = allQuizData();
  const idx = combined.findIndex(q=>q.id===currentQuizId);
  const q = combined[idx];
  const isAi = q.id.startsWith('ai_');
  const prog = quizProgress[q.id];
  const answered = !!prog?.answered;

  let choicesHtml = '';
  q.choices.forEach((c, ci)=>{
    let cls = 'choice';
    if(answered){
      cls += ' locked';
      if(ci === q.correct) cls += ' reveal-correct';
      if(ci === prog.choiceIndex && ci !== q.correct) cls += ' chosen-wrong';
      if(ci === prog.choiceIndex && ci === q.correct) cls += ' chosen-correct';
    }
    choicesHtml += `
      <div class="${cls}" data-idx="${ci}">
        <span class="letter">${'ABCD'[ci]}</span>
        <span>${escapeHtml(c)}</span>
      </div>
    `;
  });

  let explainHtml = '';
  if(answered){
    explainHtml = `
      <div class="explain-box ${isAi?'ai':''}">
        <span class="tag">${isAi ? '✦ AI解説' : '解説'}</span>
        <p>${escapeHtml(q.explain)}</p>
      </div>
      <div class="next-row">
        <button class="btn" id="backListBtn2">一覧に戻る</button>
      </div>
    `;
  }

  $('#quizDetail').innerHTML = `
    <button class="back-btn" id="backListBtn">← 一覧に戻る</button>
    <div class="card">
      <div class="qnum mono" style="margin-bottom:10px;">${isAi ? '<span class="ai-badge">✦ AI生成問題</span>' : 'Q'+(QUIZ_DATA.findIndex(bq=>bq.id===q.id)+1).toString().padStart(2,'0')+' / '+QUIZ_DATA.length}</div>
      <p class="detail-q">${escapeHtml(q.q)}</p>
      <div class="choice-list">${choicesHtml}</div>
      ${explainHtml}
    </div>
  `;

  $('#backListBtn').addEventListener('click', backToQuizList);
  const backBtn2 = $('#backListBtn2');
  if(backBtn2) backBtn2.addEventListener('click', backToQuizList);

  if(!answered){
    $$('.choice', $('#quizDetail')).forEach(el=>{
      el.addEventListener('click', async ()=>{
        const chosen = parseInt(el.dataset.idx,10);
        quizProgress[q.id] = { answered:true, correctFlag: chosen===q.correct, choiceIndex: chosen };
        await saveQuizProgress();
        renderQuizDetail();
      });
    });
  }
}

function backToQuizList(){
  $('#quizDetail').classList.add('hidden');
  $('#quizList').classList.remove('hidden');
  renderQuizList();
}

async function submitPractice(){
  if(submittingPractice) return;
  const title = $('#pTitle').value.trim() || '無題のシーン';
  const text = $('#pText').value.trim();
  if(!text){ showToast('接客トークの内容を入力してください'); return; }

  submittingPractice = true;
  $('#submitPracticeBtn').disabled = true;
  $('#submitPracticeBtn').innerHTML = '<span class="spinner"></span>AIが分析中…';

  const systemPrompt = 'あなたはタイヤ販売店で20年のキャリアを持つベテラン接客トレーナーです。新人スタッフが書いた接客トークの原稿を読み、日本語で次の3つの観点でフィードバックしてください。【良かった点】【改善したい点】【次に試したい言い回し】。合計250〜350字程度、箇条書き中心で、新人が萎縮しないよう前向きで具体的なトーンにしてください。Markdownの見出し記号(#)は使わず、【】の小見出しのみ使ってください。';
  const userPrompt = `シーン: ${title}\n\n接客トーク原稿:\n${text}`;

  try{
    const feedback = await callAI(systemPrompt, userPrompt, 900);
    const entry = { id: uid(), title, staff: getStaffName(), text, feedback, timestamp: Date.now() };
    const res = await window.storage.set('practice-entry:'+entry.id, JSON.stringify(entry), true);
    if(!res) throw new Error('save failed');

    $('#latestFeedback').innerHTML = `
      <div class="feedback-card">
        <span class="tag">✦ AIコーチからのフィードバック</span>
        <div class="body-text">${escapeHtml(feedback)}</div>
      </div>
    `;
    $('#pText').value = '';
    $('#pCount').textContent = '0';
    showToast('AIフィードバックを取得しました');
    loadPracticeEntries();
  }catch(e){
    showToast('AIフィードバックの取得に失敗しました。もう一度お試しください。');
  }finally{
    submittingPractice = false;
    $('#submitPracticeBtn').disabled = false;
    $('#submitPracticeBtn').innerHTML = 'AIにフィードバックを依頼する';
  }
}

async function loadPracticeEntries(){
  const listEl = $('#practiceList');
  if(!listEl) return;
  try{
    const listRes = await window.storage.list('practice-entry:', true);
    const keys = (listRes && listRes.keys) || [];
    if(keys.length===0){
      listEl.innerHTML = emptyState('まだ練習履歴がありません', '上のフォームから最初のロープレをAIに見てもらいましょう。');
      return;
    }
    const items = [];
    for(const k of keys){
      try{
        const r = await window.storage.get(k, true);
        if(r && r.value) items.push(JSON.parse(r.value));
      }catch(e){}
    }
    items.sort((a,b)=>b.timestamp-a.timestamp);
    listEl.innerHTML = items.map(en => `
      <details class="entry">
        <summary>
          <div>
            <h4>${escapeHtml(en.title)}</h4>
            <div class="meta">担当: ${escapeHtml(en.staff)} ・ ${fmtDate(en.timestamp)}</div>
          </div>
          <span class="ai-badge">✦ AI講評あり</span>
        </summary>
        <div class="entry-body">
          <div class="label">接客トーク原稿</div>
          <div class="orig-text">${escapeHtml(en.text)}</div>
          <div class="feedback-card" style="margin-top:0;">
            <span class="tag">✦ AIコーチからのフィードバック</span>
            <div class="body-text">${escapeHtml(en.feedback)}</div>
          </div>
        </div>
      </details>
    `).join('');
  }catch(e){
    listEl.innerHTML = emptyState('読み込みに失敗しました', 'ページを再読み込みしてお試しください。');
  }
}

let currentPostId = null;

async function loadPosts(){
  const listEl = $('#postList');
  try{

    if(keys.length===0){
      listEl.innerHTML = emptyState('まだ質問の投稿がありません', '「＋質問を投稿」から接客で困った状況を共有してみましょう。');
      $('#postDetail').classList.add('hidden');
      listEl.classList.remove('hidden');
      return;
    }
    const posts = [];
    for(const k of keys){
      try{
        const r = await window.storage.get(k, true);
        if(r && r.value) posts.push(JSON.parse(r.value));
      }catch(e){}
    }
    posts.sort((a,b)=>b.timestamp-a.timestamp);
    listEl.innerHTML = posts.map(p => `
      <div class="post-item" data-id="${p.id}">
        <h4>${escapeHtml(p.title)}</h4>
        <p>${escapeHtml(p.body)}</p>
        <div class="meta">

  }
}

  `;
  document.body.appendChild(bg);
  $('#cancelPostBtn', bg).addEventListener('click', ()=>bg.remove());
  bg.addEventListener('click', (e)=>{ if(e.target===bg) bg.remove(); });
  $('#submitPostBtn', bg).addEventListener('click', async ()=>{
    const title = $('#newTitle', bg).value.trim();
    const body = $('#newBody', bg).value.trim();
    if(!title || !body){ showToast('タイトルと内容を入力してください'); return; }
    const post = { id: uid(), title, body, author: getStaffName(), timestamp: Date.now(), comments: [] };
    try{
      await window.storage.set('board-post:'+post.id, JSON.stringify(post), true);
      bg.remove();
      showToast('質問を投稿しました');
      loadPosts();
    }catch(e){ showToast('投稿に失敗しました'); }
  });
});

/* ===================== 初期化 ===================== */
(async function init(){
  await loadQuizProgress();
  await loadAiQuizBank();
  renderQuizList();

  renderPracticeForm();
  await loadPracticeEntries();

  await loadPosts();
})();
</script>
